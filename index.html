<!DOCTYPE html>
<html>
<head>
  <title>Cookie Catch Game 🍪</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Comic Sans MS';
      background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 60%, #f4d19b 60%, #f4d19b 100%);
      text-align: center;
    }

    #gameUI {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px;
      background: rgba(255,255,255,0.9);
      z-index: 10;
    }

    h1 {
      margin: 0;
      color: #ff5a5a;
      font-size: 26px;
    }

    #target {
      font-size: 22px;
      margin-top: 5px;
    }

    #score {
      font-size: 20px;
    }

    #feedback {
      font-size: 24px;
      font-weight: bold;
      height: 25px;
    }

    /* 🍪 COOKIE */
    .cookie {
      position: absolute;
      width: 90px;
      height: 90px;
      background: url("https://cdn-icons-png.flaticon.com/512/1047/1047711.png") no-repeat center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 900;
      color: white;
      text-shadow:
        2px 2px 0px black,
        -2px -2px 0px black,
        2px -2px 0px black,
        -2px 2px 0px black;
      cursor: pointer;
      animation: float 1s infinite ease-in-out alternate;
    }

    .cookie:active {
      transform: scale(0.9);
    }

    @keyframes float {
      from { transform: translateY(0px); }
      to { transform: translateY(8px); }
    }

    /* 💰 EMAIL BOX */
    #emailBox {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      padding: 12px;
      box-shadow: 0 -3px 10px rgba(0,0,0,0.2);
    }

    #emailBox input {
      padding: 10px;
      width: 60%;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    #emailBox button {
      padding: 10px 15px;
      background: #ff5a5a;
      color: white;
      border: none;
      border-radius: 5px;
      margin-left: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="gameUI">
  <h1>🍪 Catch the Cookie!</h1>
  <div id="target"></div>
  <div id="score">Score: 0</div>
  <div id="feedback"></div>
</div>

<script>
const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let targetLetter = "";
let score = 0;

// 🔊 Sounds
const correctSound = new Audio("https://www.soundjay.com/buttons/sounds/button-4.mp3");
const wrongSound = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");

// 🔊 Better voice loader
speechSynthesis.onvoiceschanged = () => {};

function newRound() {
  targetLetter = letters[Math.floor(Math.random() * letters.length)];
  document.getElementById("target").innerText = "Find: " + targetLetter;
}

// 🔊 Improved voice
function speakLetter(letter) {
  const voices = speechSynthesis.getVoices();

  let voice = voices.find(v =>
    v.name.includes("Google") ||
    v.name.includes("Samantha") ||
    v.name.includes("Female")
  );

  let speech = new SpeechSynthesisUtterance(letter);
  speech.voice = voice || voices[0];
  speech.rate = 0.9;
  speech.pitch = 1.3;

  speechSynthesis.speak(speech);
}

function showFeedback(text, color) {
  const feedback = document.getElementById("feedback");
  feedback.innerText = text;
  feedback.style.color = color;

  setTimeout(() => {
    feedback.innerText = "";
  }, 700);
}

function createCookie() {
  const cookie = document.createElement("div");
  cookie.className = "cookie";

  const letter = letters[Math.floor(Math.random() * letters.length)];
  cookie.innerText = letter;

  cookie.style.left = Math.random() * (window.innerWidth - 90) + "px";
  cookie.style.top = "-90px";

  document.body.appendChild(cookie);

  let speed = 3 + Math.random() * 2;

  let fall = setInterval(() => {
    cookie.style.top = cookie.offsetTop + speed + "px";

    if (cookie.offsetTop > window.innerHeight) {
      cookie.remove();
      clearInterval(fall);
    }
  }, 20);

  cookie.onclick = () => {
    speakLetter(letter);

    if (letter === targetLetter) {
      score++;
      correctSound.play();
      showFeedback("Nice! 🎉", "green");
    } else {
      score--;
      wrongSound.play();
      showFeedback("Try again ❌", "red");
    }

    document.getElementById("score").innerText = "Score: " + score;

    cookie.remove();
    clearInterval(fall);
    newRound();
  };
}

// START GAME
newRound();
setInterval(createCookie, 800);
</script>

<!-- 💰 LEAD CAPTURE -->
<div id="emailBox">
  <p>🎁 Get more fun games for your kids!</p>
  <input type="email" placeholder="Enter your email">
  <button>Get Access</button>
</div>

</body>
</html>
